receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:3000"
            - "http://frontend:3000"

  prometheus:
    config:
      scrape_configs:
        - job_name: "pricecompare-api"
          static_configs:
            - targets: ["backend:9090"]
          scrape_interval: 15s

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    limit_mib: 256
    check_interval: 5s

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: insert

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: pricecompare

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: warn

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/jaeger, debug]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
